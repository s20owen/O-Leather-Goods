<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LeatherCraft</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="hero">
      <div class="heroMedia">
        <img src="/assets/hero.png" alt="Leather goods hero">
        <div class="heroOverlay">
          <h1 class="heroTitle">Built for decades, not seasons</h1>
          <a class="heroBtn" href="/collection.html">Browse Pieces</a>
        </div>
      </div>
      <div class="pagePad" id="collections">
        <div class="grid3" id="collectionTiles"></div>
      </div>
    </section>

    <section class="section">
      <h2 class="h2">Featured Pieces</h2>
      <div class="grid4" id="bestGrid"></div>
    </section>

    <section class="section">
      <div class="workshopShowcase">
        <div class="workshopMain">
          <img src="https://images.pexels.com/photos/5963139/pexels-photo-5963139.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Leather maker preparing full-grain leather">
        </div>
        <div class="workshopSide">
          <!-- <img src="https://images.pexels.com/photos/4452514/pexels-photo-4452514.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Leather tools and hand cutting pattern"> -->
          <img src="assets/Consortium_Leather_Tag.png" alt="Toscana Leather Consortium tag">
        </div>
      </div>

    </section>

    <section class="section">
      <div class="featureStrip">
        <div>Premium Leather</div>
        <div>Made by Hand</div>
        <div>Built to Last</div>
      </div>
    </section>

    <section class="section" id="about">
      <div class="page">
        <div class="pagePad">
          <h2 class="h2" style="margin-bottom:10px">Handcrafted Quality</h2>
          <div style="font:500 15px/1.7 var(--sans); color:rgba(30,29,27,.86)">
            See something you like? Request it as shown — or request a custom build with your preferred options.
          </div>
          <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
            <a class="btn" style="width:auto" href="/custom.html">Request a Custom Build</a>
            <a class="btn secondary" style="width:auto" href="/contact.html">Ask a Question</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/pages/home.js"></script>
</body>
</html>

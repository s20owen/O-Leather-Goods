<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thank You</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header id="siteHeader"></header>

  <main class="container">
    <section class="page">
      <div class="pagePad" id="pad">
        <h1 class="h2" style="margin:0">Thanks — we got it.</h1>
        <div class="muted" style="margin-top:10px;font:500 14px/1.7 var(--sans)">
          We’ll respond by email as soon as possible.
        </div>
        <div class="hr"></div>
        <a class="btn" href="/collection.html">Back to Shop</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { boot } from "/js/app.js";
    await boot();

    const pad = document.getElementById("pad");
    const type = sessionStorage.getItem("last_request_type");
    const ref = sessionStorage.getItem("last_request_ref");

    if (type === "custom" && ref) {
      const div = document.createElement("div");
      div.className = "badge";
      div.style.marginTop = "12px";
      div.innerHTML = `Your Request Ref: <b>${ref}</b>`;
      pad.appendChild(div);
    }

    // cleanup
    sessionStorage.removeItem("last_request_type");
    sessionStorage.removeItem("last_request_ref");
  </script>
</body>
</html>
